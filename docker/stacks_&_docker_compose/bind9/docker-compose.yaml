---
services:
  bind9:
    image: ubuntu/bind9:latest
    container_name: bind9
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    environment:
      TZ: America/Montreal
      BIND9_USER: root
    volumes:
      - /docker/bind9/config:/etc/bind
      - /docker/bind9/cache:/var/cache/bind
      - /docker/bind9/records:/var/log/bind
    labels:
      - "diun.enable=true"
