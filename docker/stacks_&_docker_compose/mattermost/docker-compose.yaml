---
services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG}
    restart: ${RESTART_POLICY}
    environment:
      # timezone inside container
      - TZ

      # necessary Postgres options/variables
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - back-end
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    labels:
      - "diun.enable=true"

  mattermost:
    image: mattermost/${MATTERMOST_IMAGE}:${MATTERMOST_IMAGE_TAG}
    restart: ${RESTART_POLICY}
    environment:
      # timezone inside container
      - TZ

      # necessary Mattermost options/variables (see env.example)
      - MM_SQLSETTINGS_DRIVERNAME
      - MM_SQLSETTINGS_DATASOURCE

      # necessary for bleve
      - MM_BLEVESETTINGS_INDEXDIR

      # additional settings
      - MM_SERVICESETTINGS_SITEURL
    volumes:
      - ${MATTERMOST_CONFIG_PATH}:/mattermost/config:rw
      - ${MATTERMOST_DATA_PATH}:/mattermost/data:rw
      - ${MATTERMOST_LOGS_PATH}:/mattermost/logs:rw
      - ${MATTERMOST_PLUGINS_PATH}:/mattermost/plugins:rw
      - ${MATTERMOST_CLIENT_PLUGINS_PATH}:/mattermost/client/plugins:rw
      - ${MATTERMOST_BLEVE_INDEXES_PATH}:/mattermost/bleve-indexes:rw
    depends_on:
      - postgres
    networks:
      - front-end
      - back-end
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    read_only: ${MATTERMOST_CONTAINER_READONLY}
    tmpfs:
      - /tmp
    labels:
      - "diun.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.chat-http.entrypoints=web"
      - "traefik.http.routers.chat-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.chat-http.rule=Host(`${TOP_URL:-chat}.${BASE_URL:?BASE_URL not set}`)"
      - "traefik.http.routers.chat-https.entrypoints=websecure"
      - "traefik.http.routers.chat-https.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.chat-https.rule=Host(`${TOP_URL:-chat}.${BASE_URL:?BASE_URL not set}`)"
      - "traefik.http.routers.chat-https.tls=true"
      - "traefik.http.routers.chat-https.tls.certresolver=production"
      - "traefik.http.routers.chat-https.service=chat-svc"
      - "traefik.http.services.chat-svc.loadBalancer.server.port=443"
      - "traefik.docker.network=front-end"

networks:
  front-end:
    external: true
  back-end:
    external: true
