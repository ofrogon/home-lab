---
services:
  wallos:
    image: bellamy/wallos:latest
    container_name: wallos
    restart: unless-stopped
    # user: "${PUID}:${PGID}"
    #    ports:
    #      - "8282:80/tcp"
    environment:
      TZ: America/Montreal
      UID: $PUID
      GID: $PGID
    volumes:
      - "/docker/wallos/db:/var/www/html/db"
      - "/docker/wallos/logos:/var/www/html/images/uploads/logos"
    networks:
      - front-end
    labels:
      - "diun.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.wallos-http.entrypoints=web"
      - "traefik.http.routers.wallos-http.rule=Host(`${TOP_URL:-wallos}.${BASE_URL:?BASE_URL not set}`)"
      - "traefik.http.routers.wallos-https.entrypoints=websecure"
      - "traefik.http.routers.wallos-https.rule=Host(`${TOP_URL:-wallos}.${BASE_URL:?BASE_URL not set}`)"
      - "traefik.http.routers.wallos-https.tls=true"
      - "traefik.http.routers.wallos-https.tls.certresolver=production"
      - "traefik.http.routers.wallos-https.service=wallos-svc"
      - "traefik.http.services.wallos-svc.loadBalancer.server.port=80"
      - "traefik.docker.network=front-end"

networks:
  front-end:
    external: true
