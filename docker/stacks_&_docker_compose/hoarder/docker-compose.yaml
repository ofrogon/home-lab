---
services:
  web:
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    container_name: hoarder
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    # ports:
    #  - 3000:3000
    environment:
      TZ: America/Montreal
      PUID: $PUID
      PGID: $PGID
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      OPENAI_API_KEY: $OPENAI_API_KEY
      DATA_DIR: /data
    volumes:
      - "/docker/hoarder/data/:/data"
    env_file:
      - stack.env
    networks:
      - front-end
      - back-end
    labels:
      - "diun.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.hoarder-http.entrypoints=web"
      - "traefik.http.routers.hoarder-http.rule=Host(`${TOP_URL:-karakeep}.${BASE_URL:?BASE_URL not set}`)"
      - "traefik.http.routers.hoarder-https.entrypoints=websecure"
      - "traefik.http.routers.hoarder-https.rule=Host(`${TOP_URL:-karakeep}.${BASE_URL:?BASE_URL not set}`)"
      - "traefik.http.routers.hoarder-https.tls=true"
      - "traefik.http.routers.hoarder-https.tls.certresolver=production"
      - "traefik.http.routers.hoarder-https.service=hoarder-svc"
      - "traefik.http.services.hoarder-svc.loadBalancer.server.port=3000"
      - "traefik.docker.network=front-end"

  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: hoarder-chrome
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    user: "${PUID}:${PGID}"
    environment:
      TZ: America/Montreal
      PUID: $PUID
      PGID: $PGID
    networks:
      - back-end
    labels:
      - "diun.enable=true"

  meilisearch:
    image: getmeili/meilisearch:v1.37.0
    container_name: hoarder-meilisearch
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      TZ: America/Montreal
      PUID: $PUID
      PGID: $PGID
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch:/meili_data
    env_file:
      - stack.env
    networks:
      - back-end
    labels:
      - "diun.enable=true"

volumes:
  meilisearch:

networks:
  front-end:
    external: true
  back-end:
    external: true
