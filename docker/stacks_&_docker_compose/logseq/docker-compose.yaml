---
services:
  logseq:
    image: ghcr.io/logseq/logseq-webapp:latest
    container_name: logseq
    restart: unless-stopped
    # ports:
    #   - 80:80
    environment:
      TZ: America/Montreal
    networks:
      - front-end
    labels:
      - "diun.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.logseq-http.entrypoints=web"
      - "traefik.http.routers.logseq-http.rule=Host(`${TOP_URL:-logseq}.${BASE_URL:?BASE_URL not set}`)"
      - "traefik.http.routers.logseq-https.entrypoints=websecure"
      - "traefik.http.routers.logseq-https.rule=Host(`${TOP_URL:-logseq}.${BASE_URL:?BASE_URL not set}`)"
      - "traefik.http.routers.logseq-https.tls=true"
      - "traefik.http.routers.logseq-https.tls.certresolver=production"
      - "traefik.http.routers.logseq-https.service=logseq-svc"
      - "traefik.http.services.logseq-svc.loadBalancer.server.port=80"
      - "traefik.docker.network=front-end"

networks:
  front-end:
    external: true
