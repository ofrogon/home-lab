---
services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    restart: unless-stopped
    command:
      - serve
    user: "${PUID}:${PGID}"
    #    ports:
    #      - 80:80
    environment:
      TZ: America/Montreal
      NTFY_BASE_URL: https://ntfy.${BASE_URL:?base url required}
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_AUTH_FILE: /var/cache/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_BEHIND_PROXY: true
      NTFY_ATTACHMENT_CACHE_DIR: /var/cache/ntfy/attachments
      NTFY_ENABLE_LOGIN: true
    volumes:
      - /docker/ntfy/cache:/var/cache/ntfy
      - /docker/ntfy/etc:/etc/ntfy
    healthcheck: # optional: remember to adapt the host:port to your environment
      test:
        [
          "CMD-SHELL",
          "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - front-end
    labels:
      - "diun.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.ntfy-http.entrypoints=web"
      - "traefik.http.routers.ntfy-http.rule=Host(`${TOP_URL:-ntfy}.${BASE_URL:?error BASE_URL required}`)"
      - "traefik.http.routers.ntfy-https.entrypoints=websecure"
      - "traefik.http.routers.ntfy-https.rule=Host(`${TOP_URL:-ntfy}.${BASE_URL:?error BASE_URL required}`)"
      - "traefik.http.routers.ntfy-https.tls=true"
      - "traefik.http.routers.ntfy-https.tls.certresolver=production"
      - "traefik.http.routers.ntfy-https.service=ntfy-svc"
      - "traefik.http.services.ntfy-svc.loadBalancer.server.port=80"
      - "traefik.docker.network=front-end"

networks:
  front-end:
    external: true
