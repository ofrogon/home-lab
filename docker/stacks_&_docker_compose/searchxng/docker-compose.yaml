  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    networks:
      - front-end
      - back-end
    #    ports:
    #      - "127.0.0.1:8080:8080"
    volumes:
      - /docker/searxng:/etc/searxng:rw
    environment:
      TZ: America/Montreal
      SEARXNG_BASE_URL: https://${SEARXNG_HOSTNAME:-localhost}/
      UWSGI_WORKERS: ${SEARXNG_UWSGI_WORKERS:-4}
      UWSGI_THREADS: ${SEARXNG_UWSGI_THREADS:-4}
      SEARXNG_IMAGE_PROXY: true
      SEARXNG_STATIC_USE_HASH: true
      # SEARXNG_REDIS_URL: "redis://redis:6379/0"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    labels:
      - "diun.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.search-http.entrypoints=web"
      - "traefik.http.routers.search-http.rule=Host(`${TOP_URL:-search}.${BASE_URL:?error}`)"
      - "traefik.http.routers.search-https.entrypoints=websecure"
      - "traefik.http.routers.search-https.rule=Host(`${TOP_URL:-search}.${BASE_URL:?error}`)"
      - "traefik.http.routers.search-https.tls=true"
      - "traefik.http.routers.search-https.tls.certresolver=production"
      - "traefik.http.routers.search-https.service=search-svc"
      - "traefik.http.services.search-svc.loadBalancer.server.port=8080"
      - "traefik.docker.network=front-end"
      # External magic
      - "traefik.http.routers.search-https-public.entrypoints=websecure-public"
      - "traefik.http.routers.search-https-public.rule=Host(`${TOP_URL:-search}.${PUBLIC_URL:?error}`)"
      - "traefik.http.routers.search-https-public.tls=true"
      - "traefik.http.routers.search-https-public.tls.certresolver=production"
      - "traefik.http.routers.search-https-public.service=search-svc"

networks:
  front-end:
    external: true
  back-end:
    external: true

volumes:
  valkey-data2:
